<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UFT-8">
        <title>Report</title>
        <link rel='stylesheet' href='{{url_for("static", filename = "css/controlButton.css")}}'>
    </head>
    <style>
        #title{
            font-size: 50px;
            text-decoration: underline, bold, italics;
            text-align: center;
        }
        p{
            color: white;
            background-color: green;
            font-size: 30px;
            width: 90%;
            margin: 0px auto;
            text-align: center;
            border-radius: 3px;
            border: none;
        }
        #leaderBoard{
            position: relative;
            display: block;
            background-color: yellow;
            color: black;
            margin: auto;
            height: 100px;
            width: 70%;
            border: none;
            font-size: 50px;
            text-justify: center;
            cursor: pointer;
            top: 370px;
        }
    </style>
    <body>
        <h1 id='title'>成績表</h1>
        <hr/>
        <p id='score-and-trial'></p>
        <br/>
        <p id='avg-score'></p>
        <br/>
        <p id='is_passed'></p>
        <br/>
        <div id='control-rack'>
            <button class='control-button' id='continue' onclick="start('question');">再試一次</button>
            <button class='control-button' id='quit' onclick="quit();">退出遊戲</button>
        </div>
        <button id="leaderBoard" onclick="start('leaderboard')">排行榜</button>
        <script src="{{url_for('static', filename = 'js/controller.js')}}"></script>
        <script>
            let avgScore = parseFloat(localStorage.getItem('score')); 
            let trial = parseInt(localStorage.getItem('trial'));
            let score = avgScore / 100 * trial;
            const basicResult = document.getElementById('score-and-trial');
            const overallResult = document.getElementById('avg-score');
            const summary = document.getElementById('is_passed');
            if (!avgScore){
                avgScore = 0;
            }
            if (!trial){
                trial = 0;
            }
            basicResult.innerText = `分數 : ${score}               回答次數 : ${trial}`;
            overallResult.innerText = `平均得分 : ${avgScore}`;
            if (avgScore >= 40){
                summary.innerText = '是否合格 : 是';
                summary.style.setProperty('background-color', 'green');
            } else {
                summary.innerText = '是否合格 : 否';
                summary.style.setProperty('background-color', 'red');
            }
        </script>
    </body>
</html>
