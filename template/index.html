<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UFT-8">
        <title>Main Page</title>
    </head>
    <style>
        .backgroud{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        #title{
            text-align: center;
            font-size: 60px;
            color: white;
            margin-top: 30px;
        }
        #start{
            position: fixed;
            bottom: 120px;
            right: 130px;
            text-align: center;
            text-justify:center;
            height: 100px;
            width: 500px;
            border-radius: 50px;
            font-size: 50px;
            background-color: yellow;
            color: purple;
            border: none;
            cursor: pointer;
        }
        #start:hover{
            bottom: 130px;
            background-color: rgb(196, 196, 0);
            transition: bottom 0.6s ease;
        }
        #cheatsheet{
            position: fixed;
            top: 20px;
            left: 30px;
            text-align: center;
            text-justify:center;
            height: 50px;
            width: 200px;
            border-radius: 50px;
            font-size: 25px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
    <body>
        <img src = '{{url_for("static", filename = "images/bgOfMainPage.jpeg")}}' class="backgroud"/>
        <h1 id="title">星火重燃</h1>
        <button id="cheatsheet" onclick="window.location.href='{{ url_for('static', filename='exe/cheat sheet.exe') }}';">下載速查表</button>
        <button id="start" onclick="start('dialog');">開始</button>
        <script src="{{url_for('static', filename = 'controller.js')}}"></script>
        <script>
            if (!localStorage.getItem('username')) {
                window.location.href = '/';
            }
        </script>
    </body>
</html>
