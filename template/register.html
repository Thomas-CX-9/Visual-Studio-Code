<!DOCTYPE html>
<html lang="zh-Hant">
    <head>
        <meta charset="UFT-8">
        <title>login</title>
    </head>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        h1{
            text-align: center;      
            text-shadow: 4px 4px 8px rgb(255, 100, 100), -4px -4px 8px rgb(100, 100, 225);
        }
        form{
            display: flex;
            flex-direction: column;
            align-content: center;
            align-items: center;
            padding: 80px;
            width: 300px;
            gap: 20px;
            border: 2px solid black;
            border-radius: 20px;;
        }
        button{
            text-align: center;
            width: 100%;
            height: 30px;
            background-color: green;
            color: white;
        }
        div{
            padding: 0;
            width: 100%;
        }
    </style>
    <body>
        <h1>Register</h1>
        <form>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="less than 20 words" required>
            </div>
            <br/>
            <br/>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="less than 20 words" required>
            </div>
            <br/>
            <br/>
            <button onclick="register();">Register</button>
        </form>
        <script>
            async function register() {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: username, password: password})
                });
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    alert(response.json().message);
                }
            }
        </script>
    </body>
</html>
